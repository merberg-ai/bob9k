web:
  host: 0.0.0.0
  port: 8080
  debug: false
logging:
  file: logs/bob9k.log
lights:
  enabled: true
  left_pins:
    r: 13
    g: 19
    b: 0
  right_pins:
    r: 1
    g: 5
    b: 6
  critical_blink_interval_s: 0.5
  colors:
    false:
    - 0
    - 0
    - 0
    booting:
    - 255
    - 180
    - 0
    ready:
    - 0
    - 255
    - 0
    error:
    - 255
    - 0
    - 0
    battery_critical:
    - 255
    - 0
    - 0
    police_blue:
    - 0
    - 0
    - 255
  police_interval_s: 0.25
servo:
  driver:
    address: 95
    frequency: 50
    min_pulse_us: 500
    max_pulse_us: 2500
  steering:
    channel: 0
    center: 90
    trim: 0
    min_angle: 45
    max_angle: 135
    step: 10
    invert: true
  camera_pan:
    channel: 1
    center: 90
    trim: 0
    min_angle: 40
    max_angle: 140
    step: 10
    invert: true
  camera_tilt:
    channel: 2
    center: 90
    trim: 0
    min_angle: 40
    max_angle: 140
    step: 10
    invert: true
ultrasonic:
  trigger_pin: 23
  echo_pin: 24
  max_distance_m: 2.0
  samples: 3
  sample_delay_s: 0.02
  offset_cm: 0.0
battery:
  low_voltage: 6.8
  critical_voltage: 6.4
  bus: 1
  address: 72
  channel: 0
  command: 132
  adc_vref: 4.93
  divider_r_high: 3000
  divider_r_low: 1000
  samples: 7
  sample_delay_s: 0.01
  offset: 0.0
  full_voltage: 8.4
telemetry:
  poll_interval_s: 2.0
switches:
  pins:
  - 9
  - 25
  - 11
motors:
  backend: auto
  helper_lib_path: ''
  channels:
  - 1
  - 2
  - 3
  - 4
  invert_channels: []
  reverse_drive: true
  address: 95
  frequency: 50
  default_speed: 40
  command_timeout_s: 0.75
  left_invert: false
  right_invert: true


camera:
  width: 640
  height: 480
  fps: 20
  rotation: 0
  awb_mode: auto
  brightness: 0.0
  contrast: 1.0
  saturation: 1.0
  sharpness: 1.0
  exposure_compensation: 0.0
  manual_red_gain: null
  manual_blue_gain: null


tracking:
  enabled: false
  mode: camera_track
  detector: face
  target_label: ''
  yolo_model: yolov8n.pt
  enable_yolo: false
  yolo_imgsz: 320
  yolo_classes: []
  confidence_min: 0.45
  max_results: 20
  min_area: 1500
  min_target_area: 900
  pan_gain: 0.06
  tilt_gain: 0.06
  x_deadzone_px: 48
  y_deadzone_px: 36
  smoothing_alpha: 0.4
  scan_when_lost: true
  scan_step: 2
  scan_tilt_step: 0
  lost_timeout_s: 1.5
  process_every_n_frames: 3
  box_padding_px: 8
  show_labels: true
  show_crosshair: true
  show_metrics_overlay: true
  preferred_target: largest
  servo_idle_hold_s: 0.35
  invert_error_x: false
  invert_error_y: false
  jpeg_every_n_frames: 2
  idle_sleep_s: 0.02
  stats_log_interval_s: 10.0
  overlay_enabled: true
  follow_reverse_enabled: true
  follow_target_lock_iou_min: 0.12
  follow_target_lock_center_px: 160
  follow_target_switch_margin: 1.2
  follow_distance_hysteresis_cm: 6
  follow_image_size_hysteresis: 0.025
  follow_distance_smoothing_alpha: 0.35
  follow_steer_smoothing_alpha: 0.45
  follow_min_drive_update_s: 0.2
  follow_steer_max_step_deg: 8
  follow_steer_deadzone_px: 36
  follow_image_steer_weight: 0.7
  follow_pan_steer_weight: 0.3
  follow_pan_steer_smoothing_alpha: 0.2
  follow_steer_jitter_deg: 2

