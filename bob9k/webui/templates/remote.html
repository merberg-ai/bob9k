<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>bob9k - HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 30, 48, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00ffcc;
            --accent-glow: 0 0 15px rgba(0, 255, 204, 0.5);
            --danger: #ff3366;
            --text-main: #f0f0f0;
            --text-muted: #8899aa;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Jura', sans-serif;
            color: var(--text-main);
            /* Prevent bounce scrolling on iOS */
            overscroll-behavior-y: none;
        }

        /* Full Screen Camera Background */
        .camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Glassmorphic HUD overlay layer */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            pointer-events: none; /* Let clicks pass through empty areas */
        }

        /* Top Bar: Telemetry */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 25px;
            pointer-events: auto;
        }

        .hud-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-value.critical {
            color: var(--danger);
            animation: pulse-danger 1s infinite alternate;
        }

        /* Middle Area */
        .mid-area {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            pointer-events: none;
        }

        /* D-Pads */
        .dpad {
            position: relative;
            width: 160px;
            height: 160px;
            pointer-events: auto;
            border-radius: 50%;
            background: rgba(10, 15, 25, 0.3);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transform: translateZ(0); /* Force hardware accel for touch */
        }
        
        .dpad-label {
            position: absolute;
            top: -30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.7;
            pointer-events: none;
        }

        .btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.1s;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            /* Prevent long presses from opening context menus on mobile */
            -webkit-touch-callout: none;
        }

        .btn:active, .btn.active {
            background: rgba(0, 255, 204, 0.2);
            border-color: var(--accent);
            color: #fff;
            box-shadow: var(--accent-glow);
            transform: scale(0.95);
        }

        /* D-Pad Layouts */
        .btn-up { top: 5px; left: 55px; }
        .btn-down { bottom: 5px; left: 55px; }
        .btn-left { top: 55px; left: 5px; }
        .btn-right { top: 55px; right: 5px; }
        .btn-center { 
            top: 55px; 
            left: 55px; 
            border-radius: 50%; 
            background: rgba(255, 255, 255, 0.05); 
            font-size: 0.8rem;
        }

        /* Bottom Bar: E-Stop and Nav */
        .bottom-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 30px 25px;
            pointer-events: auto;
            position: relative;
        }

        .btn-exit {
            position: absolute;
            left: 30px;
            bottom: 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            backdrop-filter: blur(4px);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn-estop {
            background: linear-gradient(135deg, rgba(255,51,102,0.8), rgba(200,10,50,0.8));
            border: 2px solid #ff6688;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-family: 'Jura', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .btn-estop:active {
            transform: scale(0.92);
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.8);
            background: #ff3366;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.5;
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: var(--accent);
        }

        .crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .crosshair::after { top: 0; left: 50%; width: 1px; height: 100%; }

        @keyframes pulse-danger {
            0% { opacity: 0.6; }
            100% { opacity: 1; text-shadow: 0 0 10px var(--danger); }
        }

        /* Landscape orientation prompt if needed */
        @media screen and (orientation: portrait) {
            .hud-overlay {
                display: none !important;
            }
            .portrait-warning {
                display: flex;
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background: #000;
                z-index: 9999;
                color: var(--accent);
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 20px;
                font-size: 1.2rem;
            }
        }
        @media screen and (orientation: landscape) {
            .portrait-warning {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Camera Feed -->
    <img id="camera" class="camera-feed" src="/video_feed" alt="Camera Feed Offline" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'%23111\'/><text x=\'50%\' y=\'50%\' fill=\'white\' text-anchor=\'middle\' font-family=\'monospace\'>CAMERA OFFLINE</text></svg>'">
    
    <div class="crosshair"></div>

    <div class="portrait-warning">
        <div>
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            <p>Please rotate your device to<br>landscape mode to pilot.</p>
        </div>
    </div>

    <!-- HUD Overlay -->
    <div class="hud-overlay">
        
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="hud-panel">
                <div class="stat-group">
                    <span class="stat-label">BATT</span>
                    <span class="stat-value" id="hud-batt">--%</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">PING</span>
                    <span class="stat-value" id="hud-ping">--ms</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">SYS</span>
                    <span class="stat-value" id="hud-sys">OK</span>
                </div>
            </div>
            
            <div class="hud-panel">
                <div class="stat-group">
                    <span class="stat-label">PAD</span>
                    <span class="stat-value" id="hud-pad">--</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">SONAR</span>
                    <span class="stat-value" id="hud-sonar">--cm</span>
                </div>
            </div>
        </div>

        <!-- Middle Area (Virtual Joysticks) -->
        <div class="mid-area">
            
            <!-- Drive D-Pad -->
            <div class="dpad" id="drive-pad">
                <div class="dpad-label">DRIVE</div>
                <div class="btn btn-up" data-cmd="fwd">▲</div>
                <div class="btn btn-left" data-cmd="lft">◀</div>
                <div class="btn btn-right" data-cmd="rgt">▶</div>
                <div class="btn btn-down" data-cmd="bwd">▼</div>
                <div class="btn btn-center" id="btn-stop">■</div>
            </div>

            <!-- Camera D-Pad -->
            <div class="dpad" id="cam-pad">
                <div class="dpad-label">CAMERA</div>
                <div class="btn btn-up" data-cmd="cam-up">▲</div>
                <div class="btn btn-left" data-cmd="cam-lft">◀</div>
                <div class="btn btn-right" data-cmd="cam-rgt">▶</div>
                <div class="btn btn-down" data-cmd="cam-dwn">▼</div>
                <div class="btn btn-center" data-cmd="cam-home">CTR</div>
            </div>

        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <a href="/" class="btn-exit">EXIT HUD</a>
            <button class="btn-estop" id="btn-estop">E-STOP</button>
        </div>
    </div>

    <script>
        // API Helpers
        async function apiPost(endpoint, data = {}) {
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (err) {
                console.warn('API Post failed:', endpoint, err);
            }
        }

        // --- Drive Controls ---
        let currentDriveAction = null;
        let controlLoopActive = false;
        
        // When touch is held, repeat command occasionally as a keepalive for the watchdog
        async function runControlLoop() {
            if (controlLoopActive) return;
            controlLoopActive = true;
            while (currentDriveAction) {
                if (currentDriveAction === 'fwd') await apiPost('/api/motor/forward', { speed: 80 });
                else if (currentDriveAction === 'bwd') await apiPost('/api/motor/backward', { speed: 80 });
                else if (currentDriveAction === 'lft') {
                    await apiPost('/api/steering/left');
                    await new Promise(r => setTimeout(r, 100)); // Rate limit steering
                }
                else if (currentDriveAction === 'rgt') {
                    await apiPost('/api/steering/right');
                    await new Promise(r => setTimeout(r, 100));
                }
                
                await new Promise(r => setTimeout(r, 200));
            }
            controlLoopActive = false;
        }

        function startDrive(action, el) {
            el.classList.add('active');
            currentDriveAction = action;
            runControlLoop();
        }

        function stopDrive() {
            currentDriveAction = null;
            document.querySelectorAll('#drive-pad .btn').forEach(b => b.classList.remove('active'));
            
            // Auto-center steering and stop motors when releasing
            apiPost('/api/motor/stop');
            apiPost('/api/steering/center');
        }

        // Attach Drive Listeners
        document.querySelectorAll('#drive-pad .btn').forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');
            if (!cmd) return; // Ignore center stop block if no data-cmd

            // Touch support
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startDrive(cmd, btn); }, {passive: false});
            btn.addEventListener('touchend', (e) => { e.preventDefault(); stopDrive(); }, {passive: false});
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); stopDrive(); }, {passive: false});
            
            // Mouse support for testing
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); startDrive(cmd, btn); });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); stopDrive(); });
            btn.addEventListener('mouseleave', (e) => { e.preventDefault(); stopDrive(); });
        });

        document.getElementById('btn-stop').addEventListener('touchstart', (e) => {
            e.preventDefault(); apiPost('/api/motor/stop');
        });

        // --- Camera Controls ---
        let currentCamAction = null;
        let camLoopActive = false;
        
        async function runCamLoop() {
            if (camLoopActive) return;
            camLoopActive = true;
            while (currentCamAction) {
                if (currentCamAction === 'cam-up') await apiPost('/api/camera/tilt_up');
                else if (currentCamAction === 'cam-dwn') await apiPost('/api/camera/tilt_down');
                else if (currentCamAction === 'cam-lft') await apiPost('/api/camera/pan_left');
                else if (currentCamAction === 'cam-rgt') await apiPost('/api/camera/pan_right');
                
                await new Promise(r => setTimeout(r, 150)); // Rate limit servos
            }
            camLoopActive = false;
        }

        function startCam(action, el) {
            el.classList.add('active');
            if (action === 'cam-home') {
                apiPost('/api/camera/home');
                setTimeout(() => el.classList.remove('active'), 200);
            } else {
                currentCamAction = action;
                runCamLoop();
            }
        }

        function stopCam() {
            currentCamAction = null;
            document.querySelectorAll('#cam-pad .btn').forEach(b => b.classList.remove('active'));
        }

        // Attach Camera Listeners
        document.querySelectorAll('#cam-pad .btn').forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');
            if (!cmd) return;

            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startCam(cmd, btn); }, {passive: false});
            btn.addEventListener('touchend', (e) => { e.preventDefault(); stopCam(); }, {passive: false});
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); stopCam(); }, {passive: false});
            
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); startCam(cmd, btn); });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); stopCam(); });
            btn.addEventListener('mouseleave', (e) => { e.preventDefault(); stopCam(); });
        });

        // --- Emergency Stop ---
        document.getElementById('btn-estop').addEventListener('touchstart', (e) => {
            e.preventDefault();
            navigator.vibrate && navigator.vibrate(200);
            apiPost('/api/motor/estop');
        });
        document.getElementById('btn-estop').addEventListener('mousedown', (e) => {
            apiPost('/api/motor/estop');
        });

        // --- Telemetry Polling ---
        async function pollTelemetry() {
            const start = performance.now();
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const ping = Math.round(performance.now() - start);

                // Update UI
                const battEl = document.getElementById('hud-batt');
                battEl.textContent = data.battery_percent !== null ? `${data.battery_percent}%` : '--%';
                if (data.battery_status === 'critical') battEl.classList.add('critical');
                else battEl.classList.remove('critical');

                document.getElementById('hud-sonar').textContent = data.distance_cm !== null ? `${data.distance_cm.toFixed(1)}cm` : '--cm';
                document.getElementById('hud-ping').textContent = `${ping}ms`;
                
                const padEl = document.getElementById('hud-pad');
                if (data.gamepad_connected) {
                    padEl.textContent = 'ON';
                    padEl.style.color = '#00ffcc';
                } else {
                    padEl.textContent = 'OFF';
                    padEl.style.color = 'var(--text-muted)';
                }
                
                const sysEl = document.getElementById('hud-sys');
                if (data.estop_latched) {
                    sysEl.textContent = 'E-STOP';
                    sysEl.classList.add('critical');
                } else {
                    sysEl.innerHTML = `M:${data.motor_state}<br>S:${data.speed}%`;
                    sysEl.classList.remove('critical');
                }
                
            } catch (err) {
                document.getElementById('hud-sys').textContent = 'ERR';
                document.getElementById('hud-sys').classList.add('critical');
            }
            
            setTimeout(pollTelemetry, 500);
        }

        // Start Telemetry
        pollTelemetry();
        
        // Wake Lock to prevent screen sleep while driving
        if ('wakeLock' in navigator) {
            let wakeLock = null;
            const requestWakeLock = async () => {
                try {
                wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {}
            };
            requestWakeLock();
            document.addEventListener('visibilitychange', () => {
                if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
            });
        }
    </script>
</body>
</html>
